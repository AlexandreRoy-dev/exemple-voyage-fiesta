<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyage Fiesta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#025091',
                            orange: '#F26522',
                            dark: '#1F2937',
                            light: '#F3F7FA'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .sticky-booking { position: sticky; top: 1rem; }
        .tab-active { border-bottom: 3px solid #F26522; color: #F26522; font-weight: 600; }
        .product-tab { border-bottom: 3px solid transparent; color: #6b7280; }
        .product-tab:hover { color: #F26522; }
        .gallery-tile { cursor: pointer; }
        .gallery-tile:hover img { transform: scale(1.03); }
        .gallery-tile img { transition: transform 0.3s ease; }
        #gallery-lightbox:not(.hidden) { display: flex; }
        .occupation-option {
            display: block;
            min-height: 3.25rem;
            padding: 0.875rem 1rem;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            cursor: pointer;
        }
        .occupation-option.is-selected {
            border-color: #F26522;
            background-color: #fff7ed;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .occupation-option-indicator {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #d1d5db;
            border-radius: 9999px;
            flex-shrink: 0;
            position: relative;
        }
        .occupation-option.is-selected .occupation-option-indicator {
            border-color: #F26522;
        }
        .occupation-option.is-selected .occupation-option-indicator::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: #F26522;
            border-radius: 9999px;
        }
        .occupation-radio {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        @media (max-width: 1023px) {
            .sticky-booking { position: static; top: auto; }
            #open-reservation { min-height: 3rem; touch-action: manipulation; }
        }
        @supports (padding: max(0px)) {
            @media (max-width: 1023px) {
                body.product-has-booking { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
            }
        }
    </style>
</head>
<body class="bg-brand-light text-gray-800 font-sans product-has-booking">

    <div class="bg-red-600 text-white py-2 overflow-hidden">
        <div class="container mx-auto px-4 flex justify-center items-center gap-4">
            <span class="font-bold animate-pulse text-sm md:text-base">🔥 OFFRE AUBAINES EXPRESS VOYAGE :</span>
            <div id="countdown" class="font-mono font-bold text-lg tracking-tighter">00j 00h 00m 00s</div>
        </div>
    </div>

    <div id="product-content"></div>

    <div id="not-found" class="hidden container mx-auto px-4 py-24 text-center">
        <h1 class="text-2xl font-bold text-brand-blue mb-4">Forfait introuvable</h1>
        <p class="text-gray-600 mb-6">Ce produit n'existe pas ou n'est plus disponible.</p>
        <a href="index.html" class="bg-brand-blue hover:bg-brand-orange text-white font-medium py-2 px-6 rounded transition-colors">Retour aux promotions</a>
    </div>

    <div id="gallery-lightbox" class="hidden fixed inset-0 z-[110] bg-black/95 flex-col" role="dialog" aria-modal="true" aria-label="Galerie photos">
        <div class="flex justify-between items-center px-4 py-3 text-white shrink-0">
            <span id="gallery-lightbox-counter" class="text-sm font-medium"></span>
            <button type="button" id="gallery-lightbox-close" class="text-3xl leading-none text-white/80 hover:text-white" aria-label="Fermer">&times;</button>
        </div>
        <div class="relative flex-grow flex items-center justify-center px-4 pb-4 min-h-0">
            <button type="button" id="gallery-lightbox-prev" class="absolute left-2 md:left-6 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/20 text-white w-10 h-10 rounded-full" aria-label="Photo précédente">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <img id="gallery-lightbox-image" src="" alt="" class="max-h-[75vh] max-w-full object-contain rounded-lg shadow-2xl">
            <button type="button" id="gallery-lightbox-next" class="absolute right-2 md:right-6 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/20 text-white w-10 h-10 rounded-full" aria-label="Photo suivante">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <div id="reservation-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60" id="modal-backdrop"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-hidden flex flex-col">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 class="font-bold text-brand-blue text-lg">Réserver ce forfait</h3>
                <button id="close-modal" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
            </div>
            <div class="p-4 overflow-y-auto flex-grow">
                <p id="modal-product-name" class="text-sm text-gray-600 mb-4 font-medium"></p>
                <div id="ghl-form-container" class="min-h-[400px]">
                    <div id="ghl-form-placeholder" class="text-center py-12 text-gray-400 text-sm border border-dashed rounded-xl">
                        <i class="fa-solid fa-file-lines text-3xl mb-3"></i>
                        <p>Formulaire GHL à configurer dans <code class="text-xs bg-gray-100 px-1 rounded">config.js</code></p>
                        <p class="mt-2 text-xs">Collez l'URL d'intégration du formulaire GoHighLevel.</p>
                    </div>
                    <iframe id="ghl-form-iframe" class="hidden w-full min-h-[500px] border-0" title="Formulaire de réservation" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-top-navigation allow-top-navigation-by-user-activation"></iframe>
                </div>
            </div>
        </div>
    </div>
    <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>

    <script src="config.js?v=4"></script>
    <script src="api.js?v=19"></script>
    <script>
        const criteriaIcons = {
            pour_adultes_18: 'fa-cocktail',
            familial: 'fa-users',
            romantique__lune_de_miel: 'fa-heart',
            tranquille__dtente: 'fa-spa',
            animation__fte: 'fa-music',
            pour_celibataires: 'fa-champagne-glasses',
            adapt_aux_bbs: 'fa-baby',
            directement_sur_la_plage: 'fa-umbrella-beach',
            vue_sur_la_mer: 'fa-water',
            deuxime_ligne_courte_marche: 'fa-person-walking',
            prs_du_centreville: 'fa-city',
            isol__en_nature: 'fa-tree',
            tout_inclus_allinclusive: 'fa-utensils',
            djeuners_inclus: 'fa-mug-saucer',
            plan_europen_sans_repas: 'fa-bed',
            boissons_de_marques_premium_incluses: 'fa-wine-glass',
            soupers__la_carte_illimits: 'fa-utensils',
            glissades_deau__parc_aquatique: 'fa-water-ladder',
            piscine_pour_enfants: 'fa-child-reaching',
            piscine_rserve_aux_adultes: 'fa-person-swimming',
            piscine__dbordement_infinity: 'fa-water',
            prendre_un_verre_dans_la_piscine_swim_up_bar: 'fa-martini-glass-citrus',
            section_privilge__club_slect: 'fa-star',
            spa__centre_de_bientre: 'fa-spa',
            wifi_gratuit_partout: 'fa-wifi',
            wifi_gratuit_au_lobby_seulement: 'fa-wifi',
            service_aux_chambres_24h: 'fa-bell-concierge',
            rcemment_rnov: 'fa-hammer',
            accessible_en_fauteuil_roulant: 'fa-wheelchair',
            parcours_de_golf__proximit: 'fa-golf-ball-tee',
            centre_de_plonge_padi: 'fa-water',
            tennis: 'fa-table-tennis-paddle-ball',
            sports_nautiques_non_motoriss_inclus: 'fa-sailboat',
            gym__centre_de_fitness: 'fa-dumbbell',
            casino_sur_place: 'fa-dice',
            vol_direct_sans_escale: 'fa-plane',
            transferts_aroporthtel_inclus: 'fa-bus',
            dpart_de_nuit: 'fa-moon',
            siges_en_classe_conomique_privilge: 'fa-chair'
        };

        function renderStars(count) {
            return VoyageFiestaAPI.renderStarsHtml(count);
        }

        function formatStarsText(count) {
            return VoyageFiestaAPI.formatStarsLabel(count);
        }

        function getInclusions(p) {
            const base = [
                { icon: 'fa-plane', text: 'Vols aller-retour directs ou avec escales' },
                { icon: 'fa-bus', text: 'Transferts aéroport → hôtel → aéroport' },
                { icon: 'fa-hotel', text: 'Hébergement pour la durée du séjour' },
                { icon: 'fa-suitcase', text: '1 bagage enregistré (selon le transporteur)' },
                { icon: 'fa-shield-halved', text: 'Contribution au Fonds FICAV' }
            ];
            if (p.packageType.includes('Tout-Inclus') || p.packageType.includes('Croisière')) {
                base.splice(3, 0, { icon: 'fa-utensils', text: 'Formule repas et boissons' });
            } else if (p.packageType.includes('Plan Européen') || p.packageType.includes('Vol + Hôtel')) {
                base.splice(3, 0, { icon: 'fa-mug-saucer', text: 'Petit-déjeuner quotidien' });
            } else if (p.packageType.includes('Circuit')) {
                base.splice(3, 0, { icon: 'fa-map', text: 'Guide francophone et excursions incluses' });
            }
            return base;
        }

        function galleryOverlayLabel(count) {
            if (count <= 1) return '';
            const extra = count - 3;
            if (extra > 0) return `+${extra} photo${extra > 1 ? 's' : ''}`;
            return `${count} photo${count > 1 ? 's' : ''}`;
        }

        function buildProductGalleryHtml(p, gallery) {
            const count = gallery.length;
            const main = gallery[0];
            const thumb1 = gallery[1] || gallery[0];
            const thumb2 = gallery[2] || gallery[1] || gallery[0];
            const overlayLabel = galleryOverlayLabel(count);
            const alt = escapeHtml(p.name);

            const overlayHtml = overlayLabel
                ? `<button type="button" class="gallery-open absolute inset-0 z-10 bg-black/45 hover:bg-black/55 flex items-center justify-center transition-colors border-0 p-0 cursor-pointer" data-gallery-index="0" aria-label="Ouvrir la galerie (${count} photos)">
                        <span class="text-white font-bold text-sm drop-shadow">${overlayLabel}</span>
                   </button>`
                : '';

            return `
                <div class="rounded-xl overflow-hidden border border-gray-100 shadow-sm min-w-0" id="product-gallery">
                    <div class="grid grid-cols-1 md:grid-cols-[minmax(0,3fr)_minmax(0,1fr)] gap-0.5 sm:gap-2 md:h-96 bg-gray-200 md:bg-transparent">
                        <button type="button" class="gallery-open gallery-tile relative block w-full min-w-0 min-h-[220px] md:min-h-0 md:h-full bg-gray-300 rounded-t-xl md:rounded-l-xl md:rounded-tr-none overflow-hidden border-0 p-0 text-left aspect-[16/10] md:aspect-auto" data-gallery-index="0" aria-label="Ouvrir la photo principale">
                            <img src="${main}" class="absolute inset-0 w-full h-full object-cover pointer-events-none" alt="${alt}">
                            <span class="absolute bottom-4 left-4 z-[1] bg-black/60 text-white px-3 py-1 rounded-full text-xs pointer-events-none">${escapeHtml(p.subDest)}</span>
                        </button>
                        <div class="hidden md:grid grid-rows-2 gap-2 h-full min-h-0 min-w-0">
                            <button type="button" class="gallery-open gallery-tile relative block w-full min-w-0 min-h-0 h-full bg-gray-300 rounded-tr-xl overflow-hidden border-0 p-0" data-gallery-index="${Math.min(1, count - 1)}" aria-label="Ouvrir la galerie">
                                <img src="${thumb1}" class="absolute inset-0 w-full h-full object-cover pointer-events-none" alt="Chambre — ${alt}">
                            </button>
                            <div class="relative min-h-0 h-full min-w-0 rounded-br-xl overflow-hidden bg-gray-300">
                                <button type="button" class="gallery-open gallery-tile absolute inset-0 z-0 border-0 p-0 w-full h-full" data-gallery-index="${Math.min(2, count - 1)}" aria-label="Ouvrir la galerie">
                                    <img src="${thumb2}" class="w-full h-full object-cover pointer-events-none" alt="Activités — ${alt}">
                                </button>
                                ${overlayHtml}
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        let activeGallery = [];
        let activeGalleryAlt = '';
        let gallerySlideIndex = 0;

        function bindGalleryViewer(gallery, altText) {
            activeGallery = gallery;
            activeGalleryAlt = altText || 'Photo';

            const lightbox = document.getElementById('gallery-lightbox');
            const imageEl = document.getElementById('gallery-lightbox-image');
            const counterEl = document.getElementById('gallery-lightbox-counter');
            const prevBtn = document.getElementById('gallery-lightbox-prev');
            const nextBtn = document.getElementById('gallery-lightbox-next');
            const closeBtn = document.getElementById('gallery-lightbox-close');

            function renderSlide() {
                if (!activeGallery.length) return;
                imageEl.src = activeGallery[gallerySlideIndex];
                imageEl.alt = `${activeGalleryAlt} — photo ${gallerySlideIndex + 1}`;
                counterEl.textContent = `${gallerySlideIndex + 1} / ${activeGallery.length}`;
                prevBtn.classList.toggle('hidden', activeGallery.length <= 1);
                nextBtn.classList.toggle('hidden', activeGallery.length <= 1);
            }

            function openLightbox(index) {
                if (!activeGallery.length) return;
                gallerySlideIndex = Math.max(0, Math.min(index, activeGallery.length - 1));
                renderSlide();
                lightbox.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.classList.add('hidden');
                imageEl.src = '';
                const reservationOpen = !document.getElementById('reservation-modal')?.classList.contains('hidden');
                if (!reservationOpen) document.body.style.overflow = '';
            }

            function step(delta) {
                if (activeGallery.length <= 1) return;
                gallerySlideIndex = (gallerySlideIndex + delta + activeGallery.length) % activeGallery.length;
                renderSlide();
            }

            document.querySelectorAll('.gallery-open').forEach(btn => {
                btn.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const index = parseInt(btn.getAttribute('data-gallery-index') || '0', 10);
                    openLightbox(Number.isNaN(index) ? 0 : index);
                };
            });

            closeBtn.onclick = closeLightbox;
            prevBtn.onclick = () => step(-1);
            nextBtn.onclick = () => step(1);
            lightbox.onclick = (e) => {
                if (e.target === lightbox) closeLightbox();
            };

            if (!window.__galleryKeysBound) {
                window.__galleryKeysBound = true;
                document.addEventListener('keydown', (e) => {
                    const lb = document.getElementById('gallery-lightbox');
                    if (!lb || lb.classList.contains('hidden')) return;
                    if (e.key === 'Escape') window.__galleryClose?.();
                    if (e.key === 'ArrowLeft') window.__galleryStep?.(-1);
                    if (e.key === 'ArrowRight') window.__galleryStep?.(1);
                });
            }

            window.__galleryStep = step;
            window.__galleryClose = closeLightbox;
        }

        function escapeHtml(text) {
            return String(text ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function formatHotelDescription(text) {
            const trimmed = String(text ?? '').trim();
            if (!trimmed) return '';
            return escapeHtml(trimmed)
                .split(/\n{2,}/)
                .map(p => `<p class="mb-3 last:mb-0 leading-relaxed">${p.replace(/\n/g, '<br>')}</p>`)
                .join('');
        }

        function buildHotelDetailsHtml(p, criteriaHtml) {
            const description = formatHotelDescription(p.hotelDescription);
            const fallbackDescription = `
                <p class="leading-relaxed text-gray-600 mb-3">
                    ${escapeHtml(p.name)} est situé à ${escapeHtml(p.location || p.subDest || p.destination)}.
                    ${p.stars ? `Cet établissement classé ${formatStarsText(p.stars)} ` : 'Cet établissement '}
                    vous accueille pour un séjour de ${p.durationNights} nuit${p.durationNights > 1 ? 's' : ''}
                    ${p.subDest ? ` à ${escapeHtml(p.subDest)}` : ''}${p.country ? `, ${escapeHtml(p.country)}` : ''}.
                </p>
                ${p.roomCategory ? `<p class="leading-relaxed text-gray-600">Catégorie de chambre incluse : <strong>${escapeHtml(p.roomCategory)}</strong>.</p>` : ''}`;

            const facts = [
                { label: 'Classification', value: p.stars ? formatStarsText(p.stars) : null },
                { label: 'Type de chambre', value: p.roomCategory },
                { label: 'Destination', value: [p.destination, p.country].filter(Boolean).join(', ') },
                { label: 'Emplacement', value: p.location || p.subDest }
            ].filter(item => item.value);

            const factsHtml = facts.length
                ? `<div class="grid sm:grid-cols-2 gap-3 mb-6">
                        ${facts.map(f => `
                            <div class="bg-brand-light rounded-lg px-4 py-3 border border-blue-100">
                                <p class="text-[10px] font-bold uppercase tracking-wider text-gray-400 mb-1">${escapeHtml(f.label)}</p>
                                <p class="text-sm font-semibold text-brand-blue">${escapeHtml(f.value)}</p>
                            </div>`).join('')}
                   </div>`
                : '';

            return `
                <div class="md:flex gap-6">
                    <div class="md:w-2/5 mb-4 md:mb-0">
                        <img src="${p.imgRoom || p.img}" alt="Chambre — ${escapeHtml(p.name)}" class="w-full h-56 md:h-full min-h-[14rem] object-cover rounded-xl border border-gray-100">
                    </div>
                    <div class="md:w-3/5">
                        <h3 class="font-bold text-brand-blue text-lg mb-3">${escapeHtml(p.name)}</h3>
                        <div class="text-sm text-gray-600 mb-5">
                            ${description || fallbackDescription}
                        </div>
                        ${factsHtml}
                        ${criteriaHtml ? `
                            <div class="pt-4 border-t border-gray-200">
                                <h4 class="font-bold text-xs uppercase text-gray-400 mb-3 tracking-widest">Commodités &amp; critères</h4>
                                <div class="flex flex-wrap gap-2">${criteriaHtml}</div>
                            </div>` : ''}
                    </div>
                </div>`;
        }

        function bindProductTabs() {
            const tabs = document.querySelectorAll('[data-product-tab]');
            const panels = document.querySelectorAll('[data-product-panel]');
            if (!tabs.length) return;

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.getAttribute('data-product-tab');
                    tabs.forEach(t => {
                        t.classList.remove('tab-active');
                        t.classList.add('product-tab');
                    });
                    tab.classList.add('tab-active');
                    tab.classList.remove('product-tab');
                    panels.forEach(panel => {
                        panel.classList.toggle('hidden', panel.getAttribute('data-product-panel') !== target);
                    });
                });
            });
        }

        function buildFlightLegHtml(label, leg, carrier, airlineLogo) {
            if (!VoyageFiestaAPI.flightLegHasData(leg)) return '';

            const departDate = VoyageFiestaAPI.formatFlightDate(leg.departDate);
            const arriveDate = VoyageFiestaAPI.formatFlightDate(leg.arriveDate);
            const departTime = VoyageFiestaAPI.formatFlightTime(leg.departTime);
            const arriveTime = VoyageFiestaAPI.formatFlightTime(leg.arriveTime);
            const airlineHtml = airlineLogo
                ? `<img src="${airlineLogo}" alt="${carrier}" class="h-6 mx-auto object-contain mb-2">`
                : `<p class="text-xs font-black tracking-widest text-brand-blue uppercase mb-2">${carrier || 'Compagnie'}</p>`;

            return `
                <div class="border border-gray-200 rounded-lg overflow-hidden mb-4 last:mb-0">
                    <div class="bg-brand-blue text-white text-xs font-bold tracking-widest px-4 py-2 uppercase">${label}</div>
                    <div class="grid grid-cols-[1fr_auto_1fr] gap-2 items-center px-4 py-5 bg-white">
                        <div class="text-left">
                            <p class="font-bold text-brand-blue text-sm leading-tight">${leg.from || '—'}</p>
                            ${departDate ? `<p class="text-xs text-gray-600 mt-1">${departDate}</p>` : ''}
                            <p class="text-sm font-semibold text-gray-800 mt-0.5">${departTime}</p>
                        </div>
                        <div class="text-center px-2 min-w-[7rem]">
                            ${airlineHtml}
                            <div class="flex items-center gap-1 text-brand-blue">
                                <span class="flex-1 h-px bg-brand-blue/40"></span>
                                <i class="fa-solid fa-plane text-sm"></i>
                                <span class="flex-1 h-px bg-brand-blue/40"></span>
                            </div>
                            ${leg.number ? `<p class="text-xs font-bold text-brand-blue mt-2">${leg.number}</p>` : `<p class="text-xs text-gray-500 mt-2 italic">${VoyageFiestaAPI.formatFlightNumber(leg.number)}</p>`}
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-brand-blue text-sm leading-tight">${leg.to || '—'}</p>
                            ${arriveDate ? `<p class="text-xs text-gray-600 mt-1">${arriveDate}</p>` : ''}
                            <p class="text-sm font-semibold text-gray-800 mt-0.5">${arriveTime}</p>
                        </div>
                    </div>
                </div>`;
        }

        function buildFlightsSectionHtml(p) {
            if (!VoyageFiestaAPI.hasFlights(p)) return '';

            const flights = VoyageFiestaAPI.getEffectiveFlights(p);
            const supplierLabel = VoyageFiestaAPI.isOtherSupplier(p.supplier) ? 'Autres' : (p.supplier || 'le fournisseur');
            const carrier = p.carrier || supplierLabel;
            const airlineLogo = flights.airlineLogo || '';
            const outHtml = buildFlightLegHtml('Aller', flights.out, carrier, airlineLogo);
            const returnHtml = buildFlightLegHtml('Retour', flights.return, carrier, airlineLogo);

            if (!outHtml && !returnHtml) return '';

            return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-xl font-bold text-brand-blue mb-1">Vols</h3>
                    <p class="text-sm text-gray-600 mb-5">Vols aller-retour avec <strong>${escapeHtml(carrier)}</strong> (${supplierLabel})&nbsp;:</p>
                    ${outHtml}
                    ${returnHtml}
                    <p class="text-[11px] text-gray-500 leading-relaxed mt-4">
                        Les horaires de vol sont sujets à changement sans préavis. Veuillez vérifier auprès de la compagnie aérienne pour les bagages autorisés et les frais applicables.
                    </p>
                </div>`;
        }

        function buildPaymentTermsHtml(p) {
            const terms = VoyageFiestaAPI.getPaymentTerms(p);
            if (!terms) return '';

            const parts = [];
            if (terms.deposit !== null) {
                parts.push(`<li class="flex items-start gap-2"><i class="fa-solid fa-hand-holding-dollar text-brand-orange text-xs mt-0.5"></i> Dépôt de <strong>${VoyageFiestaAPI.formatMoney(terms.deposit)}</strong> par personne requis</li>`);
            }
            if (terms.finalPaymentDate) {
                parts.push(`<li class="flex items-start gap-2"><i class="fa-solid fa-calendar-check text-brand-blue text-xs mt-0.5"></i> Paiement final : <strong>${VoyageFiestaAPI.formatDepartureDate(terms.finalPaymentDate)}</strong></li>`);
            }
            if (terms.taxes !== null) {
                parts.push(`<li class="flex items-start gap-2"><i class="fa-solid fa-receipt text-gray-400 text-xs mt-0.5"></i> Taxes et frais aériens : <strong>${VoyageFiestaAPI.formatMoney(terms.taxes)}</strong> par personne (non inclus dans les tarifs ci-dessous)</li>`);
            }
            if (!parts.length) return '';

            return `
                <div class="mb-6 pb-6 border-b border-gray-100">
                    <h4 class="font-bold text-sm text-gray-700 uppercase tracking-tighter mb-3">Modalités de paiement</h4>
                    <ul class="space-y-2 text-sm text-gray-600">${parts.join('')}</ul>
                </div>`;
        }

        function buildOccupationSelectionHtml(p, isSoldOut) {
            const rows = VoyageFiestaAPI.getOccupationPrices(p);
            if (!rows.length) {
                return `<p class="text-sm text-gray-500 italic">Tarifs sur demande.</p>`;
            }

            return `
                <div class="space-y-3" id="occupation-picker" role="radiogroup" aria-labelledby="occupation-picker-label">
                    <p id="occupation-picker-label" class="text-xs font-bold text-gray-600 uppercase tracking-tighter">
                        Choisissez votre occ. <span class="text-brand-orange">*</span>
                    </p>
                    ${rows.map(row => `
                        <label class="occupation-option relative rounded-xl border border-gray-200 transition-colors active:scale-[0.99] ${isSoldOut ? 'opacity-50 pointer-events-none' : ''}">
                            <input type="radio" name="occ" value="${row.id}" class="occupation-radio" ${isSoldOut ? 'disabled' : ''} required>
                            <span class="occupation-option-body flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between w-full pointer-events-none">
                                <span class="flex items-center gap-3 min-w-0 pr-2">
                                    <span class="occupation-option-indicator" aria-hidden="true"></span>
                                    <span class="text-sm font-medium text-gray-700 leading-snug">${row.label}</span>
                                </span>
                                <span class="text-left sm:text-right shrink-0 sm:pl-2 pl-8">
                                    <span class="font-bold ${isSoldOut ? 'text-gray-400 line-through' : 'text-brand-blue'}">${VoyageFiestaAPI.formatMoney(row.price)}</span>
                                    ${row.taxes != null ? `<span class="block text-[11px] text-gray-500 leading-tight">+ ${VoyageFiestaAPI.formatMoney(row.taxes)} taxes</span>` : ''}
                                </span>
                            </span>
                        </label>
                    `).join('')}
                    <p id="occupation-required-hint" class="text-xs text-brand-orange font-medium pt-1 leading-relaxed">
                        <i class="fa-solid fa-circle-info mr-1"></i> Touchez une option ci-dessus avant de réserver.
                    </p>
                    <div id="occupation-summary" class="hidden text-sm bg-brand-light border border-blue-100 rounded-lg px-3 py-2.5 text-brand-blue font-medium leading-snug"></div>
                </div>`;
        }

        function buildOccupationPricesHtml(p, isSoldOut) {
            const rows = VoyageFiestaAPI.getOccupationPrices(p);
            if (!rows.length) {
                return buildOccupationSelectionHtml(p, isSoldOut);
            }

            const hasTaxes = rows.some(r => r.taxes != null);
            const priceOriginal = VoyageFiestaAPI.optionalPrice(p.priceOriginal ?? p.price_original);
            const incentive = VoyageFiestaAPI.getIncentive(p);

            let headerHtml = '';
            if (priceOriginal !== null || incentive) {
                headerHtml = `
                    <div class="mb-4 p-3 rounded-lg bg-brand-light border border-blue-100 text-sm">
                        ${priceOriginal !== null ? `<p class="text-gray-600">Prix internet : <span class="line-through text-gray-400">${VoyageFiestaAPI.formatMoney(priceOriginal)}</span> <span class="text-gray-500">/ pers. avant taxes (sujet à changement)</span></p>` : ''}
                        ${incentive ? `<p class="text-brand-orange font-bold mt-1"><i class="fa-solid fa-tag mr-1"></i> Offre Aubaines Express : économisez ${VoyageFiestaAPI.formatMoney(incentive.discount)} / pers.</p>` : ''}
                    </div>`;
            }

            let tableHtml = '';
            if (hasTaxes) {
                const tableRows = rows.map(row => `
                    <tr class="border-b border-gray-100 last:border-0">
                        <td class="py-2.5 pr-2 text-sm text-gray-700">${row.label}</td>
                        <td class="py-2.5 px-2 text-sm text-right text-gray-800">${VoyageFiestaAPI.formatMoney(row.price)}</td>
                        <td class="py-2.5 pl-2 text-sm text-right text-gray-600">${row.taxes != null ? VoyageFiestaAPI.formatMoney(row.taxes) : '—'}</td>
                    </tr>
                `).join('');

                tableHtml = `
                    <div class="overflow-x-auto -mx-1 px-1 mb-4">
                        <table class="w-full text-left min-w-[16rem]">
                            <thead>
                                <tr class="text-[10px] uppercase tracking-wider text-gray-400 border-b border-gray-200">
                                    <th class="pb-2 font-bold">Occ.</th>
                                    <th class="pb-2 font-bold text-right">Avant taxes</th>
                                    <th class="pb-2 font-bold text-right">Taxes</th>
                                </tr>
                            </thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                    </div>
                    <p class="text-[10px] text-gray-500 mb-4 italic">Tarifs par personne, avant taxes et frais aériens.</p>`;
            }

            return headerHtml + tableHtml + buildOccupationSelectionHtml(p, isSoldOut);
        }

        function renderProduct(p) {
            const isSoldOut = VoyageFiestaAPI.isSoldOut(p);
            const days = p.durationNights + 1;
            const occupationHtml = buildOccupationPricesHtml(p, isSoldOut);
            const paymentTermsHtml = buildPaymentTermsHtml(p);
            const flightsHtml = buildFlightsSectionHtml(p);
            const inclusions = getInclusions(p);
            const packageTabLabel = p.packageType || 'Forfait';

            document.title = `${p.name} - Voyage Fiesta`;

            let inventoryHtml = '';
            if (isSoldOut) {
                inventoryHtml = `
                    <div class="bg-red-50 text-red-700 border border-red-200 rounded-lg p-3 text-center mb-6">
                        <p class="font-bold text-sm"><i class="fa-solid fa-ban mr-2"></i> Forfait complet</p>
                        <p class="text-[10px] uppercase font-bold">Aucune chambre disponible à ce prix</p>
                    </div>`;
            } else if (p.inventory <= 3) {
                inventoryHtml = `
                    <div class="bg-orange-50 text-brand-orange border border-orange-100 rounded-lg p-3 text-center mb-6">
                        <p class="font-bold text-sm"><i class="fa-solid fa-fire-flame-curved mr-2"></i> Il ne reste que <span class="text-lg">${p.inventory}</span> chambre(s) !</p>
                        <p class="text-[10px] uppercase font-bold">À ce prix exceptionnel</p>
                    </div>`;
            } else {
                inventoryHtml = `
                    <div class="bg-orange-50 text-brand-orange border border-orange-100 rounded-lg p-3 text-center mb-6">
                        <p class="font-bold text-sm"><i class="fa-solid fa-fire-flame-curved mr-2"></i> Il reste <span class="text-lg">${p.inventory}</span> chambres !</p>
                        <p class="text-[10px] uppercase font-bold">À ce prix exceptionnel</p>
                    </div>`;
            }

            const criteriaHtml = p.criteria.map(c => {
                const key = VoyageFiestaAPI.normalizeCriterionValue(c);
                const label = VoyageFiestaAPI.getCriteriaLabel(key);
                const icon = criteriaIcons[key] || 'fa-tag';
                return `<span class="bg-white border px-3 py-1 rounded-full text-xs font-medium"><i class="fa-solid ${icon} mr-1"></i> ${label}</span>`;
            }).join('');

            const seoHtml = (p.seoTags || []).map(t =>
                `<span class="bg-brand-light text-brand-blue px-3 py-1 rounded text-[10px] font-bold">${t}</span>`
            ).join('');

            const metaCards = [
                { icon: 'fa-plane-up', label: 'Transporteur', value: p.carrier },
                { icon: 'fa-bed', label: 'Type de chambre', value: p.roomCategory }
            ].filter(c => String(c.value || '').trim());

            const metaCardsHtml = metaCards.length
                ? `<div class="grid ${metaCards.length > 1 ? 'md:grid-cols-2' : ''} gap-6">
                        ${metaCards.map(c => `
                            <div class="bg-white p-6 rounded-xl border border-gray-100 flex items-center gap-4">
                                <div class="bg-brand-light p-3 rounded-full text-brand-blue text-2xl shrink-0"><i class="fa-solid ${c.icon}"></i></div>
                                <div class="min-w-0">
                                    <p class="text-xs font-bold text-gray-400 uppercase">${c.label}</p>
                                    <p class="font-bold text-brand-blue truncate">${escapeHtml(c.value)}</p>
                                </div>
                            </div>`).join('')}
                   </div>`
                : '';

            const seoSectionHtml = (p.seoTags || []).length
                ? `<section class="container mx-auto px-4 py-12">
                        <div class="bg-white p-6 rounded-xl border border-gray-100">
                            <h5 class="text-xs font-bold text-gray-400 uppercase mb-4 tracking-widest">Catégories et Tags SEO</h5>
                            <div class="flex flex-wrap gap-2">${seoHtml}</div>
                        </div>
                   </section>`
                : '';

            const hotelDetailsHtml = buildHotelDetailsHtml(p, criteriaHtml);
            const gallery = VoyageFiestaAPI.buildProductGallery(p);
            const galleryHtml = buildProductGalleryHtml(p, gallery);
            const departureLabel = VoyageFiestaAPI.formatDepartureDate(p.departureDate);
            const returnLabel = VoyageFiestaAPI.formatDepartureDate(p.returnDate);

            document.getElementById('product-content').innerHTML = `
                <section class="container mx-auto px-4 py-6">
                    <nav class="text-xs text-gray-500 mb-4 flex gap-2 flex-wrap">
                        <a href="index.html" class="hover:underline">Accueil</a> <span>/</span>
                        <a href="index.html" class="hover:underline">${p.destLabel}</a> <span>/</span>
                        <span class="text-brand-blue font-bold">${p.country}</span>
                    </nav>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2 order-1 lg:order-none space-y-6 min-w-0">
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                <div class="flex flex-wrap justify-between items-start gap-4">
                                    <div>
                                        ${isSoldOut ? '<div class="inline-block bg-red-600 text-white font-bold px-3 py-1 rounded text-sm mb-3">COMPLET</div>' : ''}
                                        <h1 class="text-2xl sm:text-3xl font-bold text-brand-blue">${p.name}</h1>
                                        <div class="flex items-center gap-2 mt-2">
                                            <div class="flex text-yellow-400 text-sm">${renderStars(p.stars)}</div>
                                            <span class="text-gray-500 text-sm">(${formatStarsText(p.stars)})</span>
                                        </div>
                                        <p class="text-gray-600 mt-2"><i class="fa-solid fa-location-dot text-brand-orange"></i> ${p.location}</p>
                                    </div>
                                    <div class="bg-brand-light p-3 rounded-lg border border-blue-100 flex items-center gap-3">
                                        <div class="text-right">
                                            <p class="text-xs text-gray-500 font-bold uppercase">Fournisseur</p>
                                            <p class="text-sm font-bold text-brand-blue">${VoyageFiestaAPI.isOtherSupplier(p.supplier) ? 'Autres' : p.supplier}</p>
                                        </div>
                                        <img src="https://images.pexels.com/photos/1032650/pexels-photo-1032650.jpeg?auto=compress&cs=tinysrgb&w=96&h=96&fit=crop" class="w-12 h-12 rounded object-cover" alt="Fournisseur">
                                    </div>
                                </div>
                            </div>

                            ${galleryHtml}
                        </div>

                        <div class="lg:col-span-1 order-2 lg:order-none lg:row-span-2">
                            <div class="bg-white rounded-2xl shadow-xl border-2 ${isSoldOut ? 'border-gray-300 opacity-90' : 'border-brand-blue'} p-4 sm:p-6 sticky-booking" id="booking-panel">
                                ${inventoryHtml}

                                <div class="space-y-4 mb-6 border-b pb-6">
                                    <div class="flex justify-between text-sm gap-3">
                                        <span class="text-gray-500 shrink-0">Date de départ :</span>
                                        <span class="font-bold text-brand-blue text-right">${departureLabel || 'À confirmer'}</span>
                                    </div>
                                    ${returnLabel ? `
                                    <div class="flex justify-between text-sm gap-3">
                                        <span class="text-gray-500 shrink-0">Date de retour :</span>
                                        <span class="font-bold text-brand-blue text-right">${returnLabel}</span>
                                    </div>` : ''}
                                    <div class="flex justify-between text-sm gap-3">
                                        <span class="text-gray-500 shrink-0">Départ de :</span>
                                        <span class="font-bold text-brand-blue text-right">${p.departureAirport || 'Montréal (YUL)'}</span>
                                    </div>
                                    <div class="flex justify-between text-sm gap-3">
                                        <span class="text-gray-500 shrink-0">Durée :</span>
                                        <span class="font-bold text-brand-blue text-right">${p.durationNights} nuits / ${days} jours</span>
                                    </div>
                                </div>

                                ${paymentTermsHtml}

                                <div class="space-y-4 mb-6 sm:mb-8">
                                    <h4 class="font-bold text-sm text-gray-700 uppercase tracking-tighter">Tarifs par occ.</h4>
                                    ${occupationHtml}
                                </div>

                                ${isSoldOut
                                    ? `<button disabled class="w-full bg-gray-400 text-white font-bold py-4 rounded-xl shadow-lg cursor-not-allowed text-lg">COMPLET</button>
                                       <p class="text-center text-[10px] text-gray-400 mt-4 px-4"><a href="index.html" class="text-brand-blue hover:underline">Retour aux promotions</a></p>`
                                    : `<button type="button" id="open-reservation" disabled class="w-full bg-gray-300 text-white font-bold py-4 rounded-xl shadow-lg cursor-not-allowed opacity-60 text-lg transition-all">RÉSERVER MAINTENANT</button>
                                       <p class="text-center text-[10px] text-gray-400 mt-4 px-4">Sélectionnez une occupation ci-dessus, puis réservez. En cliquant sur réserver, vous acceptez les conditions générales de vente de Voyage Fiesta.</p>`}
                            </div>
                        </div>

                        <div class="lg:col-span-2 order-3 lg:order-none space-y-6 min-w-0">
                            ${flightsHtml}

                            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden" id="product-tabs">
                                <div class="flex border-b">
                                    <button type="button" data-product-tab="package" class="px-6 py-4 tab-active">${escapeHtml(packageTabLabel)}</button>
                                    <button type="button" data-product-tab="hotel" class="px-6 py-4 product-tab">Détails de l'hôtel</button>
                                </div>
                                <div class="p-6" data-product-panel="package">
                                    <div class="grid md:grid-cols-2 gap-8">
                                        <div>
                                            <h3 class="font-bold text-brand-blue mb-4 flex items-center"><i class="fa-solid fa-circle-check text-green-500 mr-2"></i> Inclusions</h3>
                                            <ul class="space-y-3 text-sm text-gray-600">
                                                ${inclusions.map(i => `<li class="flex items-start gap-2"><i class="fa-solid ${i.icon} text-xs mt-1"></i> ${i.text}</li>`).join('')}
                                            </ul>
                                        </div>
                                        <div class="bg-gray-50 p-4 rounded-lg">
                                            <h3 class="font-bold text-gray-700 mb-4 flex items-center"><i class="fa-solid fa-circle-xmark text-red-400 mr-2"></i> Exclusions</h3>
                                            <ul class="space-y-3 text-sm text-gray-500">
                                                <li>Tout ce qui n'est pas inscrit dans la section « Inclusions »</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div class="p-6 hidden" data-product-panel="hotel">
                                    ${hotelDetailsHtml}
                                </div>
                            </div>

                            ${metaCardsHtml}
                        </div>
                    </div>
                </section>

                ${seoSectionHtml}`;

            startCountdown(p.endDate);
            bindProductTabs();
            bindGalleryViewer(gallery, p.name);
            bindOccupationSelection(p);
            bindReservationModal(p);
        }

        function getSelectedOccupationId() {
            const radio = document.querySelector('input[name="occ"]:checked');
            return radio ? radio.value : null;
        }

        function syncOccupationVisuals() {
            document.querySelectorAll('.occupation-option').forEach(label => {
                const input = label.querySelector('input[name="occ"]');
                label.classList.toggle('is-selected', Boolean(input?.checked));
                if (input) label.setAttribute('aria-checked', input.checked ? 'true' : 'false');
            });
        }

        function bindOccupationSelection(p) {
            const openBtn = document.getElementById('open-reservation');
            if (!openBtn || VoyageFiestaAPI.isSoldOut(p)) return;

            const hint = document.getElementById('occupation-required-hint');
            const summary = document.getElementById('occupation-summary');
            const picker = document.getElementById('occupation-picker');

            function setButtonEnabled(enabled) {
                openBtn.disabled = !enabled;
                openBtn.classList.toggle('bg-brand-orange', enabled);
                openBtn.classList.toggle('hover:bg-brand-blue', enabled);
                openBtn.classList.toggle('hover:scale-[1.02]', enabled);
                openBtn.classList.toggle('active:scale-95', enabled);
                openBtn.classList.toggle('bg-gray-300', !enabled);
                openBtn.classList.toggle('cursor-not-allowed', !enabled);
                openBtn.classList.toggle('opacity-60', !enabled);
            }

            function updateSelection() {
                syncOccupationVisuals();
                const occupationId = getSelectedOccupationId();
                const row = occupationId ? VoyageFiestaAPI.getSelectedOccupationRow(p, occupationId) : null;
                const hasSelection = Boolean(occupationId);

                setButtonEnabled(hasSelection);
                if (hint) hint.classList.toggle('hidden', hasSelection);

                if (summary) {
                    if (hasSelection && row) {
                        const breakdown = VoyageFiestaAPI.getOccupationPricingBreakdown(p, occupationId);
                        summary.classList.remove('hidden');
                        let html = `<i class="fa-solid fa-check mr-1 text-green-600"></i> ${row.label}`;
                        if (breakdown) {
                            html += `<br><span class="text-xs font-normal text-gray-600">${breakdown.pricingSummary}</span>`;
                            if (breakdown.totalDeposit !== null) {
                                html += `<br><span class="text-xs font-semibold text-brand-orange">Dépôt : ${VoyageFiestaAPI.formatMoney(breakdown.totalDeposit)} (${breakdown.totalPeople} pers. × ${VoyageFiestaAPI.formatMoney(breakdown.depositPerPerson)})</span>`;
                            }
                            if (breakdown.totalWithTaxes !== null) {
                                html += `<br><span class="text-xs font-bold text-brand-blue">Total estimé : ${VoyageFiestaAPI.formatMoney(breakdown.totalWithTaxes)}</span>`;
                            } else {
                                html += `<br><span class="text-xs font-bold text-brand-blue">Total estimé : ${VoyageFiestaAPI.formatMoney(breakdown.totalBeforeTaxes)} avant taxes</span>`;
                            }
                        } else {
                            const taxesPart = row.taxes != null
                                ? ` (+ ${VoyageFiestaAPI.formatMoney(row.taxes)} taxes/pers.)`
                                : '';
                            html += ` — <strong>${VoyageFiestaAPI.formatMoney(row.price)}/pers.</strong>${taxesPart}`;
                        }
                        summary.innerHTML = html;
                    } else {
                        summary.classList.add('hidden');
                        summary.textContent = '';
                    }
                }
            }

            document.querySelectorAll('input[name="occ"]').forEach(input => {
                input.addEventListener('change', updateSelection);
                input.addEventListener('input', updateSelection);
            });

            document.querySelectorAll('.occupation-option').forEach(label => {
                label.addEventListener('click', () => {
                    requestAnimationFrame(updateSelection);
                });
            });

            if (picker) {
                picker.addEventListener('keydown', (e) => {
                    if (e.key !== 'Enter' && e.key !== ' ') return;
                    const label = e.target.closest('.occupation-option');
                    if (!label) return;
                    e.preventDefault();
                    label.click();
                });
            }

            updateSelection();
        }

        function buildGhlIframeSrc(p) {
            const occupationId = getSelectedOccupationId();
            const formParams = VoyageFiestaAPI.buildGhlReservationParams(p, occupationId);
            const params = new URLSearchParams();
            Object.entries(formParams).forEach(([key, value]) => {
                if (value !== undefined && value !== null && value !== '') params.set(key, value);
            });
            const thankYouUrl = typeof buildGhlThankYouUrl === 'function'
                ? buildGhlThankYouUrl(p.slug)
                : '';
            if (thankYouUrl) params.set('redirect_url', thankYouUrl);
            const sep = GHL_FORM_EMBED_URL.includes('?') ? '&' : '?';
            return GHL_FORM_EMBED_URL + sep + params.toString();
        }

        function bindReservationModal(p) {
            const modal = document.getElementById('reservation-modal');
            const openBtn = document.getElementById('open-reservation');
            if (!openBtn) return;

            const supplierLabel = VoyageFiestaAPI.isOtherSupplier(p.supplier) ? 'Autres' : p.supplier;
            const iframe = document.getElementById('ghl-form-iframe');
            const placeholder = document.getElementById('ghl-form-placeholder');

            function openModal() {
                const occupationId = getSelectedOccupationId();
                if (!occupationId) return;

                const row = VoyageFiestaAPI.getSelectedOccupationRow(p, occupationId);
                const departureText = VoyageFiestaAPI.formatDepartureDate(p.departureDate);
                const priceLine = row
                    ? `${VoyageFiestaAPI.formatMoney(row.price)}/pers.${row.taxes != null ? ' (+ taxes)' : ''} · ${row.label}`
                    : `${p.price}$/pers`;

                document.getElementById('modal-product-name').textContent =
                    `${p.name} — ${priceLine}${departureText ? ' · Départ ' + departureText : ''} · ${p.departureAirport} · ${supplierLabel}`;

                if (GHL_FORM_EMBED_URL) {
                    iframe.src = buildGhlIframeSrc(p);
                    iframe.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                } else {
                    iframe.classList.add('hidden');
                    placeholder.classList.remove('hidden');
                }

                modal.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }

            openBtn.addEventListener('click', openModal);
            document.getElementById('close-modal').addEventListener('click', closeModal);
            document.getElementById('modal-backdrop').addEventListener('click', closeModal);
        }

        function startCountdown(endDate) {
            const display = document.getElementById('countdown');
            function tick() {
                const ms = endDate.getTime() - Date.now();
                if (ms <= 0) {
                    display.textContent = 'OFFRE TERMINÉE';
                    return;
                }
                const days = Math.floor(ms / 86400000);
                const hours = Math.floor((ms % 86400000) / 3600000);
                const minutes = Math.floor((ms % 3600000) / 60000);
                const seconds = Math.floor((ms % 60000) / 1000);
                display.textContent =
                    `${String(days).padStart(2, '0')}j ${String(hours).padStart(2, '0')}h ${String(minutes).padStart(2, '0')}m ${String(seconds).padStart(2, '0')}s`;
            }
            tick();
            setInterval(tick, 1000);
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            if (!slug) {
                document.getElementById('not-found').classList.remove('hidden');
                document.querySelector('.bg-red-600').classList.add('hidden');
                return;
            }

            const product = await VoyageFiestaAPI.fetchProductBySlug(slug);

            if (product) {
                renderProduct(product);
            } else {
                document.getElementById('not-found').classList.remove('hidden');
                document.querySelector('.bg-red-600').classList.add('hidden');
            }
        }

        init();
    </script>
</body>
</html>
