<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription de chambre - Voyage Fiesta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#025091',
                            orange: '#F26522',
                            dark: '#1F2937',
                            light: '#F3F7FA'
                        }
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-brand-light text-gray-800 font-sans min-h-screen">
    <header class="bg-brand-blue text-white py-6 px-4">
        <div class="max-w-2xl mx-auto">
            <p class="text-xs uppercase tracking-widest text-white/70 mb-1">Voyage Fiesta</p>
            <h1 class="text-2xl font-bold">Inscription de chambre</h1>
            <p class="text-sm text-white/80 mt-1">Étapes 1 et 2 obligatoires. Étape 3 (passagers) optionnelle.</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">
        <div id="room-form-root"></div>
        <div id="room-submit-status" class="hidden mt-6 rounded-2xl border border-gray-200 bg-white p-8 text-center shadow-sm">
            <p id="room-submit-status-text" class="font-medium text-brand-blue">Envoi de votre demande…</p>
            <p class="text-sm text-gray-500 mt-2">Veuillez patienter quelques secondes.</p>
        </div>
    </main>

    <script src="config.js?v=42"></script>
    <script src="room-registration.js?v=14"></script>
    <script>
        (function () {
            RoomRegistration.injectStyles();
            const params = new URLSearchParams(window.location.search);
            const adults = Number(params.get('adults') || params.get('nombre_passagers') || 2) || 2;
            const kids = Number(params.get('kids') || params.get('enfants') || 0) || 0;
            const depositPerPerson = params.get('depot_par_personne') || params.get('deposit') || null;
            const formRoot = document.getElementById('room-form-root');
            const submitStatus = document.getElementById('room-submit-status');
            const submitStatusText = document.getElementById('room-submit-status-text');

            RoomRegistration.mountForm(formRoot, {
                initialPassengerCount: Math.min(5, Math.max(1, adults)),
                initialKidsCount: Math.min(4, Math.max(0, kids)),
                depositPerPerson: depositPerPerson != null ? Number(depositPerPerson) : null,
                async onSubmit({ payload }) {
                    const thankYou = typeof buildGhlThankYouUrl === 'function'
                        ? buildGhlThankYouUrl(params.get('forfait_slug') || '')
                        : 'thank-you.html';
                    formRoot.classList.add('hidden');
                    if (submitStatusText) submitStatusText.textContent = 'Envoi de votre demande…';
                    submitStatus.classList.remove('hidden');
                    try {
                        await RoomRegistration.submitGhlRoomForm({
                            payload,
                            redirectUrl: thankYou
                        });
                    } catch (err) {
                        formRoot.classList.remove('hidden');
                        submitStatus.classList.add('hidden');
                        alert(err?.message
                            ? `Impossible d'envoyer la demande : ${err.message}`
                            : 'Impossible d\'envoyer la demande. Veuillez réessayer.');
                    }
                }
            });
        })();
    </script>
</body>
</html>
