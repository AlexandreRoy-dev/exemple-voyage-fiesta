<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription de chambre - Voyage Fiesta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        brand: {
                            blue: '#025091',
                            orange: '#F26522',
                            dark: '#1F2937',
                            light: '#F3F7FA'
                        }
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-brand-light text-gray-800 font-sans min-h-screen">
    <header class="bg-brand-blue text-white py-6 px-4">
        <div class="max-w-2xl mx-auto">
            <p class="text-xs uppercase tracking-widest text-white/70 mb-1">Voyage Fiesta</p>
            <h1 class="text-2xl font-bold">Inscription de chambre</h1>
            <p class="text-sm text-white/80 mt-1">Étape 1 : vos coordonnées. Étape 2 : infos passagers (si vous choisissez Oui).</p>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">
        <div id="room-form-root"></div>

        <div id="ghl-handoff" class="hidden mt-6">
            <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                <div class="p-4 border-b bg-brand-light">
                    <h2 class="font-bold text-brand-blue">Confirmation</h2>
                    <p class="text-sm text-gray-600 mt-1">Vérifiez les informations préremplies, puis cliquez <strong>Envoyer</strong> dans le formulaire ci-dessous.</p>
                </div>
                <iframe id="ghl-room-iframe" class="w-full min-h-[720px] border-0" title="Formulaire GHL inscription chambre"></iframe>
            </div>
        </div>
    </main>

    <script src="config.js?v=37"></script>
    <script src="room-registration.js?v=7"></script>
    <script>
        (function () {
            RoomRegistration.injectStyles();
            const params = new URLSearchParams(window.location.search);
            const adults = Number(params.get('adults') || params.get('nombre_passagers') || 2) || 2;
            const kids = Number(params.get('kids') || params.get('enfants') || 0) || 0;
            const depositPerPerson = params.get('depot_par_personne') || params.get('deposit') || null;

            RoomRegistration.mountForm(document.getElementById('room-form-root'), {
                initialPassengerCount: Math.min(5, Math.max(1, adults)),
                initialKidsCount: Math.min(4, Math.max(0, kids)),
                depositPerPerson: depositPerPerson != null ? Number(depositPerPerson) : null,
                onSubmit({ ghlUrl }) {
                    const handoff = document.getElementById('ghl-handoff');
                    const iframe = document.getElementById('ghl-room-iframe');
                    const thankYou = typeof buildGhlThankYouUrl === 'function'
                        ? buildGhlThankYouUrl(params.get('forfait_slug') || '')
                        : 'thank-you.html';
                    const url = new URL(ghlUrl);
                    if (thankYou) url.searchParams.set('redirect_url', thankYou);
                    iframe.src = url.toString();
                    handoff.classList.remove('hidden');
                    handoff.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    document.getElementById('room-form-root').classList.add('opacity-60', 'pointer-events-none');
                }
            });
        })();
    </script>
</body>
</html>
